<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skip Feedback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
    }

    .job-meta {
      margin-bottom: 28px;
    }

    .job-meta h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1d1d1f;
      line-height: 1.3;
    }

    .job-meta .company {
      font-size: 0.95rem;
      color: #6e6e73;
      margin-top: 4px;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .reasons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .reason-btn {
      padding: 8px 16px;
      border: 1.5px solid #d1d1d6;
      border-radius: 20px;
      background: transparent;
      color: #1d1d1f;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }

    .reason-btn:hover {
      border-color: #0071e3;
      color: #0071e3;
    }

    .reason-btn.selected {
      background: #1d1d1f;
      border-color: #1d1d1f;
      color: #fff;
    }

    .detail-label {
      font-size: 0.85rem;
      color: #6e6e73;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      border: 1.5px solid #d1d1d6;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #1d1d1f;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.15s;
      margin-bottom: 24px;
    }

    textarea:focus {
      outline: none;
      border-color: #0071e3;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .submit-btn:not(:disabled):hover {
      background: #0077ed;
    }

    .confirmation {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    .confirmation .checkmark {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .confirmation h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 8px;
    }

    .confirmation p {
      font-size: 0.95rem;
      color: #6e6e73;
    }

    .error-msg {
      display: none;
      background: #fff2f2;
      border: 1px solid #ffd5d5;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Job info -->
    <div class="job-meta">
      <h1>{{ title }}</h1>
      <div class="company">{{ company }}</div>
    </div>

    <!-- Feedback form -->
    <form id="skipForm">
      <div class="section-label">Why are you skipping?</div>
      <div class="reasons" id="reasons">
        <button type="button" class="reason-btn" data-reason="Wrong domain">Wrong domain</button>
        <button type="button" class="reason-btn" data-reason="Too junior">Too junior</button>
        <button type="button" class="reason-btn" data-reason="Too senior">Too senior</button>
        <button type="button" class="reason-btn" data-reason="Pure SaaS">Pure SaaS</button>
        <button type="button" class="reason-btn" data-reason="Bad company">Bad company</button>
        <button type="button" class="reason-btn" data-reason="Location">Location</button>
        <button type="button" class="reason-btn" data-reason="Other">Other</button>
      </div>

      <div class="detail-label">Additional detail (optional)</div>
      <textarea id="detail" placeholder="Anything else to note..."></textarea>

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" class="submit-btn" id="submitBtn" disabled>Submit Feedback</button>
    </form>

    <!-- Confirmation -->
    <div class="confirmation" id="confirmation">
      <div class="checkmark">&#10003;</div>
      <h2>Noted!</h2>
      <p>Your feedback has been saved. The system will learn from this.</p>
    </div>

  </div>

  <script>
    const JOB_ID = {{ job_id | tojson }};
    let selectedReason = null;

    // Reason button selection
    document.querySelectorAll(".reason-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".reason-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedReason = btn.dataset.reason;
        document.getElementById("submitBtn").disabled = false;
      });
    });

    // Form submission
    document.getElementById("skipForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!selectedReason) return;

      const detail = document.getElementById("detail").value.trim();
      const submitBtn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");

      submitBtn.disabled = true;
      submitBtn.textContent = "Saving...";
      errorMsg.style.display = "none";

      try {
        const resp = await fetch("/api/skip", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ job_id: JOB_ID, reason: selectedReason, detail }),
        });

        const result = await resp.json();

        if (resp.ok && result.ok) {
          document.getElementById("skipForm").style.display = "none";
          document.getElementById("confirmation").style.display = "block";
        } else {
          errorMsg.textContent = result.error || "Something went wrong. Please try again.";
          errorMsg.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.textContent = "Submit Feedback";
        }
      } catch (err) {
        errorMsg.textContent = "Network error. Please try again.";
        errorMsg.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Feedback";
      }
    });
  </script>
</body>
</html>
