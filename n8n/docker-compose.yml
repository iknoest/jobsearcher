version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - GENERIC_TIMEZONE=Europe/Amsterdam
      - TZ=Europe/Amsterdam
      - N8N_SECURE_COOKIE=false
    volumes:
      - ../n8n-data:/home/node/.n8n
      - ..:/home/node/jobsearcher
    working_dir: /home/node/jobsearcher

  tg-bot:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ..:/app
    env_file:
      - ../.env
    command: >
      sh -c "pip install -r requirements.txt -q && python src/tg_bot.py"
    depends_on:
      - n8n
