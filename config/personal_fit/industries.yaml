# Personal industry taxonomy + proximity-to-Ava (single-column, PRD §14).
# Consumed by src/classify/industry.py (R2-02) and src/score/industry_proximity.py (R3-03).
#
# DESIGN RULES (locked 2026-04-20):
#   - Single-column proximity: each industry has one 0.0-1.0 score vs. Ava's combined background.
#   - Industry NEVER hard-rejects. Hard rejects come from roles.yaml (forbidden families),
#     skills.yaml (forbidden core skills), constraints.yaml (language/licence/seniority).
#     Industry ONLY raises / lowers / disambiguates fit.
#   - Unknown industry = 4/10 (neutral-low). Alive for Review, not floated up to Apply.
#   - Classifier precedence: company_hints → jd_hints → "unknown".
#
# Per-entry schema:
#   canonical_name        (required; snake_case id used in code)
#   display_name          (human-readable label shown in email cards)
#   nace_code             (NACE Rev 2.1 section/division where applicable)
#   proximity_to_ava      (0.0 = very far, 1.0 = same industry as Ava's verified work)
#   rationale             (one sentence: why this proximity value)
#   jd_hints              (keyword phrases signalling this industry if found in JD)
#   company_hints         (lowercase company name substrings; strongest classifier signal)
#   related_role_families (optional; roles.yaml entries typical for this industry)

# ══════════════════════════════════════════════════════════════
# ANCHORS — Ava's verified background industries
# ══════════════════════════════════════════════════════════════
