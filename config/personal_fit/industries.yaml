# ══════════════════════════════════════════════════════════════
# SCORER BEHAVIOUR
# ══════════════════════════════════════════════════════════════
scorer_defaults:
  max_score: 10                    # PRD §15: industry_proximity weight is 10
  unknown_industry_score: 4        # neutral-low per user decision 2026-04-20
  proximity_curve:                 # linear interpolation: proximity_to_ava → points
    type: linear
    points:
      - [0.0, 0]
      - [0.2, 2]
      - [0.5, 5]
      - [0.8, 8]
      - [1.0, 10]
  # Classification precedence (consumed by R2-02 classifier):
  classifier_precedence: [company_hints, jd_hints]
  # Industry NEVER hard-rejects on its own. See design rules at top of file.
  can_hard_reject: false
