  domain_locked_engineering:
    display_name: "Domain-locked engineering (catch-all)"
    title_patterns:
      - "\\bchemical engineer\\b"
      - "\\bpetroleum engineer\\b"
      - "\\bcivil engineer\\b"
      - "\\bstructural engineer\\b"
      - "\\brf engineer\\b"
      - "\\bnetwork engineer\\b"
      - "\\bsecurity engineer\\b"
      - "\\b(aerospace|aeronautical) engineer\\b"
      - "\\bmining engineer\\b"
      - "\\benvironmental engineer\\b"
    jd_signals_confirming: []   # title-dominant category
    jd_signals_rescuing:
      - "product design"
      - "consumer product"
      - "user research"
      - "innovation lead"
    reject_confidence_threshold: 0.7

# ──────────────────────────────────────────────────────────────
# CLASSIFIER BEHAVIOUR
# ──────────────────────────────────────────────────────────────
classifier_defaults:
  # How the classifier combines signals. Consumed by src/classify/role_family.py.
  min_title_match_weight: 0.4     # a title regex hit contributes this much
  per_signal_weight: 0.1          # each confirming JD keyword adds this
  rescue_deduction: 0.3           # each rescuing signal subtracts this from excluded confidence
  ambiguous_band: [0.4, 0.7]      # below low → no classification; above high → confident
  review_on_conflict: true        # excluded title + desired JD signals → Review (not Skip)
  min_confidence_to_hard_reject: 0.7  # global floor; per-family threshold can be stricter
