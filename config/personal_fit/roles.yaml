      - "\\belectronics engineer\\b"
      - "\\bee engineer\\b"
      - "\\belectrical r&d engineer\\b"
      - "\\belectrical architect\\b"
      - "\\belectrical (product|hardware) engineer\\b"
    jd_signals_confirming:
      - "schematic capture"
      - "pcb layout"
      - "pcb design"
      - "altium"
      - "eagle"
      - "kicad"
      - "analog circuit"
      - "power electronics"
      - "high-voltage"
      - "fpga"
      - "embedded c"
      - "signal integrity"
    jd_signals_rescuing:   # only rescue for clear product / concept / prototyping work
      - "product concept"
      - "physical product development"
      - "prototype validation"
      - "consumer product"
      - "user research"
      - "product engineer"
      - "rapid prototyping"
