  process_manufacturing_engineer:
    display_name: "Process / Manufacturing / Production Engineer"
    title_patterns:
      - "\\bprocess engineer\\b"
      - "\\bmanufacturing engineer\\b"
      - "\\bproduction engineer\\b"
      - "\\bindustrial engineer\\b"
      - "\\bplant engineer\\b"
    jd_signals_confirming:
      - "shop floor"
      - "lean manufacturing"
      - "six sigma"
      - "production line"
      - "plc"
      - "scada"
      - "cycle time"
      - "oee"
