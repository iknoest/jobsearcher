# Personal skills taxonomy.
# Consumed by src/score/hard_skill.py (to be built in R3-02).
#
# Four buckets:
#   verified       — Ava has deep, demonstrable experience (proof source required)
#   adjacent       — transferable from verified work, not native expertise
#   forbidden      — hard-reject IF JD requires as CORE (must-have / X years / core responsibility)
#                    → only "negative_signal" treatment if merely optional / nice-to-have
#   negative_signal — always a penalty (never a hard-reject), regardless of JD wording
#
# Per-entry schema:
#   canonical_name        (required, string)
#   synonyms              (list of match phrases; case-insensitive)
#   proof_source          (for verified/adjacent — role + concrete evidence; required for verified)
#   evidence_hint         (for forbidden/negative_signal — explain why it's off-target)
#   evidence_strength     (High | Medium | Low; required for verified; optional for adjacent)
#   related_role_families (optional; maps to roles.yaml entries — aids downstream scoring)
#
# Ground rule: verified entries MUST be grounded in Ava's actual career
# (BYD Europe / TomTom / Syntegon / DFO Global / Raymond Industrial / Jetta +
# BEng Mechanical HK PolyU + MSc Applied Cognitive Psychology Utrecht + 3 patents).
# Never invent. If in doubt, move to adjacent.

