# ══════════════════════════════════════════════════════════════
# SCORER BEHAVIOUR
# ══════════════════════════════════════════════════════════════
scorer_defaults:
  # Consumed by src/score/hard_skill.py (R3-02).
  verified_match_weight: 1.0          # full credit
  adjacent_match_weight: 0.5          # half credit
  forbidden_core_penalty: "reject"    # if JD marks forbidden skill as core → eligibility=0
  forbidden_optional_penalty: -5      # if forbidden skill is nice-to-have → points only
  negative_signal_penalty: -3         # each negative_signal JD match
  core_indicators:                    # JD phrases that signal "this is a core requirement"
    - "must have"
    - "must-have"
    - "required"
    - "requirements:"
    - "you have"
    - "you bring"
    - "X+ years"
    - "at least N years"
    - "strong experience in"
    - "proven experience"
    - "deep experience"
  optional_indicators:                # JD phrases that signal "nice to have"
    - "nice to have"
    - "bonus"
    - "plus"
    - "a plus"
    - "preferred"
    - "welcome"
    - "familiarity with"
    - "exposure to"
