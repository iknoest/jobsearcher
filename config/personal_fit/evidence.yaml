# ══════════════════════════════════════════════════════════════
# SCORER BEHAVIOUR
# ══════════════════════════════════════════════════════════════
scorer_defaults:
  # Consumed by src/score/evidence.py (R3-03). PRD §15.7 weight is 10.
  max_score: 10
  points_per_match: 2.0             # each matched proof_point adds this
  strength_multiplier:
    High: 1.0
    Medium: 0.7
    Low: 0.4
  cap_per_job: 10                   # ceiling regardless of how many proof points match
  # Matching rules (handled by R3-03):
  #   - A JD requirement matches a proof_point if the requirement's canonical_name
  #     appears in proof_point.skills_anchored.
  #   - Fallback: role_families_matched OR industries_matched alignment gives half credit.
  #   - One proof_point counted at most once per job.
