# Personal evidence library — one proof point per distinct achievement.
# Consumed by src/score/evidence.py (R3-03) for evidence_strength sub-score (PRD §15.7).
# Also reusable later for tailored resume / motivation letter generation.
#
# DESIGN RULES (locked 2026-04-20):
#   - Distinct achievement granularity: one proof per *meaningful proof point*,
#     not one per company.
#   - Strength scale matches skills.yaml: High=1.0 / Medium=0.7 / Low=0.4
#     applied by the scorer as a multiplier.
#   - No period/date field in V1 — avoids invented or rough dates.
#   - Grounded in config/profile.yaml + CLAUDE.md career summary.
#     If a proof point is not supported by those facts, it does not belong here.
#
# Per-entry schema:
#   id                     unique snake_case identifier
#   topic                  human-readable theme (e.g. "Voice of Customer at scale")
#   skills_anchored        list of canonical_name values from skills.yaml
#   role_families_matched  list of entries from roles.yaml (desired + ambiguous)
#   industries_matched     list of canonical_name values from industries.yaml
#   claim                  1-2 sentences; factual; directly citable
#   source_role            role and company (or certification issuer)
#   strength               High | Medium | Low
#   related_tools          optional — tools/software used
#   related_methods        optional — methods/techniques applied
#
# REVIEW NOTE: Some roles at Syntegon / DFO Global are inferred generically
# from experience_summary because profile.yaml does not map each company to a
# specific role title. Please correct in review.

