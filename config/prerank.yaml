# Pre-rank configuration — cheap, rule-based scoring applied BEFORE the LLM.
# Purpose: spend scarce LLM quota only on jobs that already look plausible.
#
# How it works:
#   pre-rank runs right after enrichment, uses only detected flags + title text.
#   Each job gets a score from the rules below; the top N are passed to the LLM.
#   No LLM calls here — editing this file is instant and free.
#
# Edit freely. All values are additive. Missing keys are ignored.

# --- Flag-based weights (applied to enrichment columns) ---
flag_weights:
  phygital_detected: 30          # strong bonus: physical product + digital integration
  pure_saas_detected: -25        # demote pure-software roles (CRM/ERP/generic fintech)
  driver_license_flagged: -15    # demote; not blocked because jobs still worth seeing
  dutch_nice_to_have: -5         # mild demote for "Dutch preferred" jobs

# --- Title keyword bonuses (case-insensitive, substring match) ---
title_bonus:
  "research": 10
  "innovation": 10
  "engineer": 10
  "prototype": 10
  "prototyping": 10
  "product": 10
  "senior": 10
  "lead": 10

# --- Title keyword penalties ---
title_penalty:
  "software": -20
  "system engineer": -15          # systems integration/testing roles, not product-facing
  "systems engineer": -15
  "test engineer": -15            # QA/validation roles — not Ava's domain
  "testing engineer": -15
  "deployment engineer": -15      # infra/ops, not product
  "manufacturing engineer": -15   # factory floor, not product design

# --- Preferred companies (case-insensitive, substring match on company name) ---
# Companies you'd happily work at — gets a strong bonus regardless of title.
preferred_companies:
  "ikea": 25
  "philips": 25
  "asml": 20
  "signify": 20
  "tomtom": 20
  "booking": 15
  "adyen": 15

# --- Demoted companies ---
# Recruiters, obvious mismatches, or places you've ruled out.
demoted_companies: {}
  # "example bad corp": -30

# --- Preferred industries (substring match against job description text) ---
# Industrial is fine when it means consumer electronics manufacturing — keep
# automotive, consumer electronics, robotics. IoT removed (not a priority domain).
industry_bonus:
  "automotive": 15              # BYD/TomTom background; EV/PHEV scoring clinics
  "consumer electronics": 12    # end-user facing hardware products
  "robotics": 10                # Jetta robotics background
  "medical devices": 10         # hardware + user research overlap
  "smart home": 8               # consumer-facing connected products
  "mobility": 8                 # automotive adjacency
  "wearable": 8                 # DFO smart wearables background

# --- Skill bonuses (substring match against job description text) ---
skill_bonus:
  "user research": 8            # core skill
  "customer research": 8        # same domain, different label
  "product research": 8
  "ux research": 8
  "market research": 7          # adjacent to Ava's VOC / consumer insight work
  "data analysis": 6            # Python/SQL/PowerBI background
  "voc": 8                      # Voice of Customer — Ava's 4000-person study background
  "voice of customer": 8
  "prototyping": 6              # hands-on product development
  "design thinking": 5
  "python": 5
  "sql": 5
  "figma": 4
  "jira": 4
  "agile": 4
  "sensor": 6
  "embedded": 5
  "cad": 4
  # --- V1 4-block: green-flag hints mapped to work-style dimensions ---
  "rapid prototyping": 8           # InnovationFit + HandsOnProximity
  "hands-on": 7                    # HandsOnProximity
  "player-coach": 10               # HandsOnProximity (explicit Ava preference)
  "0 to 1": 8                      # InnovationFit (0->1 mandate)
  "0-to-1": 8
  "zero to one": 8
  "experimentation": 6             # InnovationFit
  "end-to-end": 6                  # ownership / HandsOnProximity
  "cross-disciplinary": 5          # TeamStyleFit (IDEO-style)
  "small team": 5                  # TeamStyleFit
  "lean team": 5                   # TeamStyleFit
  "research owner": 8              # ResearchFit
  "product vision": 6              # StrategyFit
  "discovery": 5                   # ResearchFit adjacent

# --- Anti-pattern penalties (substring match against JD text) ---
# Signals that Ava's preferences.yaml lists under 'avoid' — mild demotes so
# marginally-matched roles drop below the pre-rank cutoff before LLM spend.
description_penalty:
  "stakeholder alignment": -8      # AlignmentBurden signal
  "cross-functional alignment": -8
  "roadmap prioritization across teams": -6
  "matrix organization": -8        # AlignmentBurden
  "waterfall": -10                 # ProcessHeaviness
  "compliance-driven": -6          # ProcessHeaviness
  "approval gates": -6
  "consensus-driven": -6           # AlignmentBurden
  "management consulting": -8      # traditional consulting (not IDEO-style)
  "sales-led": -6                  # product plays second fiddle
  "execution-only": -8             # avoid bucket
